
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="circle" id="mic-btn">
            <h1>🎙️</h1>
        </div>
        <p id="status">Tap the mic and speak...</p>
        <div class="chat-box">
            <p><strong>You:</strong> <span id="user-text">...</span></p>
            <p><strong>Jarvis:</strong> <span id="jarvis-text">...</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
